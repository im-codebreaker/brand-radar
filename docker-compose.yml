services:
  ###################################################
  # Traefik Proxy - SIMPLE VERSION
  ###################################################
  proxy:
    image: traefik:v2.11
    command:
      - "--api.insecure=true"
      - "--providers.docker"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  ###################################################
  # PostgreSQL
  ###################################################
  postgres:
    image: postgres:16-alpine
    container_name: brand-radar-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-brand-radar}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ###################################################
  # Redis
  ###################################################
  redis:
    image: redis:7-alpine
    container_name: brand-radar-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ###################################################
  # Meilisearch — fast, typo-tolerant search engine
  ###################################################
  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: brand-radar-meilisearch
    environment:
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey}
      MEILI_NO_ANALYTICS: ${MEILI_NO_ANALYTICS:-true}
    ports:
      - "7700:7700"
    volumes:
      - meilisearch-data:/meili_data

  ###################################################
  # API — Fastify backend, also exposed directly on :3000
  ###################################################
  api:
    build:
      context: .
      target: api-dev
    container_name: brand-radar-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-brand-radar}
      REDIS_URL: redis://redis:6379
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey}
      ACTIVE_PIPELINE_VERSION: ${ACTIVE_PIPELINE_VERSION:-1.0.0}
      API_HOST: 0.0.0.0
      API_PORT: 3000
      BASE_URL: http://localhost
      FRONTEND_URL: http://localhost
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me-in-production-please}
      BETTER_AUTH_URL: http://localhost/api/v1/auth
    labels:
      traefik.http.routers.api.rule: Host(`localhost`) && PathPrefix(`/api`)
      traefik.http.services.api.loadbalancer.server.port: 3000
    volumes:
      - ./apps/api:/brand-radar/apps/api:delegated
      - ./packages:/brand-radar/packages:delegated
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started

  ###################################################
  # Workers — background job processors
  ###################################################
  workers:
    build:
      context: .
      target: workers-dev
    container_name: brand-radar-workers
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-brand-radar}
      REDIS_URL: redis://redis:6379
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey}
      ACTIVE_PIPELINE_VERSION: ${ACTIVE_PIPELINE_VERSION:-1.0.0}
    volumes:
      - ./apps/workers:/brand-radar/apps/workers:delegated
      - ./packages:/brand-radar/packages:delegated
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started

  ###################################################
  # Scheduler — cron job manager
  ###################################################
  scheduler:
    build:
      context: .
      target: scheduler-dev
    container_name: brand-radar-scheduler
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-brand-radar}
      REDIS_URL: redis://redis:6379
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey}
      ACTIVE_PIPELINE_VERSION: ${ACTIVE_PIPELINE_VERSION:-1.0.0}
    volumes:
      - ./apps/scheduler:/brand-radar/apps/scheduler:delegated
      - ./packages:/brand-radar/packages:delegated
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started

  ###################################################
  # Web — Vue 3 SPA via Vite, also exposed directly on :5173
  ###################################################
  web:
    build:
      context: .
      target: web-dev
    container_name: brand-radar-web
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
      VITE_API_PROXY_TARGET: http://api:3000
    volumes:
      - ./apps/web:/brand-radar/apps/web:delegated
      - ./packages:/brand-radar/packages:delegated
    labels:
      traefik.http.routers.web.rule: Host(`localhost`)
      traefik.http.services.web.loadbalancer.server.port: 5173
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
  meilisearch-data:
