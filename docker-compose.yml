services:
  ###################################################
  # Traefik Proxy - SIMPLE VERSION
  ###################################################
  proxy:
    image: traefik:v3.2
    command:
      - "--api.insecure=true"
      - "--providers.docker"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  ###################################################
  # PostgreSQL
  ###################################################
  postgres:
    image: postgres:16-alpine
    container_name: brand-radar-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-brand-radar}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ###################################################
  # Redis
  ###################################################
  redis:
    image: redis:7-alpine
    container_name: brand-radar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ###################################################
  # OpenSearch — full-text search engine
  ###################################################
  opensearch:
    image: opensearchproject/opensearch:2
    container_name: brand-radar-opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ###################################################
  # API — Fastify backend, also exposed directly on :3000
  ###################################################
  api:
    build:
      context: .
      target: api-dev
    container_name: brand-radar-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-brand-radar}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENSEARCH_NODE: http://opensearch:9200
      API_HOST: 0.0.0.0
      API_PORT: 3000
      BASE_URL: http://localhost
      FRONTEND_URL: http://localhost
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me-in-production-please}
      BETTER_AUTH_URL: http://localhost
    labels:
      traefik.http.routers.api.rule: Host(`localhost`) && PathPrefix(`/api`)
      traefik.http.services.api.loadbalancer.server.port: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    develop:
      watch:
        - path: ./apps/api/src
          action: sync
          target: /brand-radar/apps/api/src
        - path: ./packages
          action: sync
          target: /brand-radar/packages
        - path: ./apps/api/package.json
          action: rebuild

  ###################################################
  # Workers — background job processors
  ###################################################
  workers:
    build:
      context: .
      target: workers-dev
    container_name: brand-radar-workers
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-brand-radar}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENSEARCH_NODE: http://opensearch:9200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    develop:
      watch:
        - path: ./apps/workers/src
          action: sync
          target: /brand-radar/apps/workers/src
        - path: ./packages
          action: sync
          target: /brand-radar/packages
        - path: ./apps/workers/package.json
          action: rebuild

  ###################################################
  # Scheduler — cron job manager
  ###################################################
  scheduler:
    build:
      context: .
      target: scheduler-dev
    container_name: brand-radar-scheduler
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-brand-radar}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENSEARCH_NODE: http://opensearch:9200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    develop:
      watch:
        - path: ./apps/scheduler/src
          action: sync
          target: /brand-radar/apps/scheduler/src
        - path: ./packages
          action: sync
          target: /brand-radar/packages
        - path: ./apps/scheduler/package.json
          action: rebuild

  ###################################################
  # Web — Vue 3 SPA via Vite, also exposed directly on :5173
  ###################################################
  web:
    build:
      context: .
      target: web-dev
    container_name: brand-radar-web
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: /api
      VITE_API_PROXY_TARGET: http://api:3000
    labels:
      traefik.http.routers.web.rule: Host(`localhost`)
      traefik.http.services.web.loadbalancer.server.port: 5173
    depends_on:
      - api
    develop:
      watch:
        - path: ./apps/web/src
          action: sync
          target: /brand-radar/apps/web/src
        - path: ./apps/web/package.json
          action: rebuild

volumes:
  postgres-data:
  redis-data:
  opensearch-data:
