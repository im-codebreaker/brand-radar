# Single-host reverse proxy for the docker compose dev stack.
# Listens on :80, routes / → Vite web container, /api → Fastify api container.
# Proxies websockets too (Vite HMR + better-auth).

upstream api {
  server api:3000;
}

upstream web {
  server web:5173;
}

server {
  listen 80;
  server_name _;

  # API (Fastify) — strip nothing, Fastify already mounts /api/v1
  location /api/ {
    proxy_pass http://api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  # OpenAPI docs at /docs (served by @fastify/swagger-ui on the api container)
  location /docs {
    proxy_pass http://api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  # Vite dev server (everything else, including HMR websocket)
  location / {
    proxy_pass http://web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
